<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>$if(title)$$title$$else$Informe Executivo$endif$</title>

    <!-- CSS institucional -->
    <link rel="stylesheet" href="styles/a4.css">
</head>

<body>

<!-- =========================================================
     CONTEÚDO MARCADO PELO PANDOC / MARKDOWN
     ========================================================= -->
<main id="pdf-source" class="pdf-body">
$body$
</main>

<!-- =========================================================
     TEMPLATE DE HEADER EXECUTIVO
     ========================================================= -->
<template id="pdf-header-template">
    <div class="pdf-header pdf-header-executive">
        <img
            class="pdf-header-bg"
            src="assets/cabecalho-caixa.png"
            alt="Cabeçalho CAIXA"
        >

        <div class="pdf-header-overlay">
                <div class="pdf-header-kicker">
                    <span>$report_date$</span>                    
                </div>

            <div class="pdf-header-title">
                $if(title)$$title$$else$Informe Executivo$endif$
            </div>

            <div class="pdf-header-subtitle">
                $if(subtitle)$$subtitle$$else$Produtos da Meta 2$endif$
            </div>
        </div>
    </div>
</template>

<!-- =========================================================
     TEMPLATE DE FOOTER EXECUTIVO
     ========================================================= -->
<template id="pdf-footer-template">
    <div class="pdf-footer pdf-footer-executive">
        <img
            class="pdf-footer-bg"
            src="assets/rodape-caixa.png"
            alt="Rodapé CAIXA"
        >

        <div class="pdf-footer-overlay">
            <div class="pdf-footer-left">
                $if(classification)$$classification$$else$#INTERNO.TODOS$endif$
                |
                $if(meta)$$meta$$else$META 2 - DIAGNÓSTICO$endif$
            </div>

            <div class="pdf-footer-center">
                $if(title)$$title$$else$Informe Executivo$endif$
                -
                $if(subtitle)$$subtitle$$else$Produtos da Meta 2$endif$
            </div>
        </div>
    </div>
</template>

<!-- =========================================================
     PAGINAÇÃO INTELIGENTE (JS)
     ========================================================= -->
<script>
(function () {
    const source = document.getElementById("pdf-source");
    const headerTemplate = document.getElementById("pdf-header-template");
    const footerTemplate = document.getElementById("pdf-footer-template");

    if (!source || !headerTemplate || !footerTemplate) {
        return;
    }

    const sourceNodes = Array.from(source.children);

    if (sourceNodes.length === 0) {
        source.style.display = "block";
        return;
    }

    const pagesRoot = document.createElement("div");
    pagesRoot.id = "pdf-pages";
    document.body.appendChild(pagesRoot);
    source.style.display = "none";

    function createPage() {
        const page = document.createElement("section");
        page.className = "print-page";

        const pageNumber = pagesRoot.children.length + 1;

        const inner = document.createElement("div");
        inner.className = "print-page-inner";

        const header = document.createElement("div");
        header.className = "print-page-header";
        header.appendChild(headerTemplate.content.firstElementChild.cloneNode(true));

        if (pageNumber === 1) {
            header.classList.add("print-page-header--cover");
        }

        const content = document.createElement("div");
        content.className = "print-page-content";

        const footer = document.createElement("div");
        footer.className = "print-page-footer";
        footer.appendChild(footerTemplate.content.firstElementChild.cloneNode(true));

        const pageNumberLabel = document.createElement("div");
        pageNumberLabel.className = "print-page-number";
        pageNumberLabel.dataset.pageNumber = String(pageNumber);

        footer.appendChild(pageNumberLabel);

        inner.appendChild(header);
        inner.appendChild(content);
        inner.appendChild(footer);

        page.appendChild(inner);
        pagesRoot.appendChild(page);

        return content;
    }

    function overflows(element) {
        return element.scrollHeight > element.clientHeight + 1;
    }

    function cloneTableShell(table) {
        const clone = table.cloneNode(false);
        const colgroup = table.querySelector("colgroup");
        const thead = table.querySelector("thead");

        if (colgroup) {
            clone.appendChild(colgroup.cloneNode(true));
        }

        if (thead) {
            clone.appendChild(thead.cloneNode(true));
        }

        const tbody = document.createElement("tbody");
        clone.appendChild(tbody);

        return { table: clone, tbody: tbody };
    }

    function placeBlock(node, content) {
        content.appendChild(node);

        if (!overflows(content)) {
            return content;
        }

        content.removeChild(node);

        const nextContent = createPage();
        nextContent.appendChild(node);

        return nextContent;
    }

    function placeTable(table, content) {
        const rows = Array.from(table.querySelectorAll("tbody > tr"));

        if (rows.length === 0) {
            return placeBlock(table, content);
        }

        let shell = cloneTableShell(table);
        content.appendChild(shell.table);

        for (const row of rows) {
            shell.tbody.appendChild(row.cloneNode(true));

            if (!overflows(content)) {
                continue;
            }

            if (shell.tbody.children.length === 1) {
                continue;
            }

            shell.tbody.removeChild(shell.tbody.lastElementChild);

            content = createPage();
            shell = cloneTableShell(table);
            content.appendChild(shell.table);
            shell.tbody.appendChild(row.cloneNode(true));
        }

        return content;
    }

    function placeHeadingWithFollower(headingNode, followerNode, content) {
        const headingClone = headingNode.cloneNode(true);
        const followerClone = followerNode.cloneNode(true);

        content.appendChild(headingClone);
        content.appendChild(followerClone);

        if (!overflows(content)) {
            return { content: content, consumedFollower: true };
        }

        content.removeChild(headingClone);
        content.removeChild(followerClone);

        content = createPage();
        content.appendChild(headingClone);
        content.appendChild(followerClone);

        return { content: content, consumedFollower: true };
    }

    function isHeading(node) {
        return node && /^H[1-6]/.test(node.tagName || "") && (node.tagName || "").length === 2;
    }

    let content = createPage();

if (pagesRoot.children.length === 1) {
    const grid = document.createElement("div");
    grid.className = "executive-grid";

    const left = document.createElement("div");
    left.className = "executive-left";

    const right = document.createElement("div");
    right.className = "executive-right";

    grid.appendChild(left);
    grid.appendChild(right);
    content.appendChild(grid);

    let currentSide = left;

    for (let i = 0; i < sourceNodes.length; i++) {
        const node = sourceNodes[i];

    /* ==========================================
       QUEBRA MANUAL DE PÁGINA
       ========================================== */
        if (
            node.classList &&
            node.classList.contains("newpage")
        ) {
            content = createPage();
            continue;
        }

        if (
            node.classList &&
            node.classList.contains("abnt-table-title")
        ) {
            currentSide = right;
            right.appendChild(node.cloneNode(true));
            continue;
        }

        if (node.tagName === "TABLE") {
            right.appendChild(node.cloneNode(true));
            continue;
        }

        if (
            node.classList &&
            node.classList.contains("abnt-table-source")
        ) {
            right.appendChild(node.cloneNode(true));
            currentSide = left;
            continue;
        }

        currentSide.appendChild(node.cloneNode(true));
    }
}

    const totalPages = pagesRoot.children.length;

    pagesRoot.querySelectorAll(".print-page-number").forEach(function (label, index) {
        label.textContent = "Página " + (index + 1) + " de " + totalPages;
    });
}());
</script>

</body>
</html>
