<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>$if(title)$$title$$else$Caderno Executivo$endif$</title>

    <link rel="stylesheet" href="styles/a4.css">

    <style>
        /* =====================================================
           AJUSTES ESPECÍFICOS DO CADERNO EXECUTIVO
           ===================================================== */

        .print-page-content {
            padding: 0.65cm 1.25cm 0.45cm 1.25cm;
            overflow: hidden;
        }

        .caderno-content {
            display: block;
            width: 100%;
        }

        .caderno-content h1 {
            font-size: 18pt;
            margin: 0 0 0.35cm;
            color: var(--caixa-azul);
            border-left: 5px solid var(--caixa-laranja);
            padding-left: 0.25cm;
        }

        .caderno-content h2 {
            font-size: 14pt;
            margin: 0.35cm 0 0.18cm;
            color: var(--caixa-azul);
            border-left: 4px solid var(--caixa-laranja);
            padding-left: 0.22cm;
        }

        .caderno-content h3 {
            font-size: 11.5pt;
            margin: 0.25cm 0 0.12cm;
            color: #14375a;
        }

        .caderno-content p {
            font-size: 9.4pt;
            line-height: 1.42;
            margin: 0 0 0.22cm;
            text-align: justify;
        }

        .caderno-content ul,
        .caderno-content ol {
            font-size: 9.2pt;
            line-height: 1.35;
            margin-top: 0.08cm;
            margin-bottom: 0.28cm;
        }

        .caderno-content li {
            margin-bottom: 0.10cm;
        }

        .caderno-content table {
            font-size: 8.2pt;
            line-height: 1.18;
            margin: 0.16cm 0 0.35cm;
            table-layout: fixed;
        }

        .caderno-content th,
        .caderno-content td {
            padding: 0.10cm 0.13cm;
            vertical-align: top;
        }

        .caderno-content th {
            font-size: 7.4pt;
            text-align: center;
        }

        .caderno-content blockquote {
            margin: 0.35cm 0;
            padding: 0.28cm 0.35cm;
            background: #f8fafc;
            border-left: 4px solid var(--caixa-laranja);
        }

        .caderno-content blockquote p {
            font-weight: 700;
            color: #30465d;
        }

        .caderno-section-break {
            page-break-before: always;
            break-before: page;
        }

        .newpage {
            display: block;
            page-break-before: always;
            break-before: page;
            height: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

<main id="pdf-source" class="pdf-body">
$body$
</main>

<template id="pdf-header-template">
    <div class="pdf-header pdf-header-executive">
        <img
            class="pdf-header-bg"
            src="assets/cabecalho-caixa.png"
            alt="Cabeçalho CAIXA"
        >

        <div class="pdf-header-overlay">
            <div class="pdf-header-kicker">
                <span>$report_date$</span>
            </div>

            <div class="pdf-header-title">
                $title$
            </div>

            <div class="pdf-header-subtitle">
                $subtitle$
            </div>
        </div>
    </div>
</template>

<template id="pdf-footer-template">
    <div class="pdf-footer pdf-footer-executive">
        <img
            class="pdf-footer-bg"
            src="assets/rodape-caixa.png"
            alt="Rodapé CAIXA"
        >

        <div class="pdf-footer-overlay">
            <div class="pdf-footer-left">
                $footer_left$
            </div>

            <div class="pdf-footer-center">
                $footer_center$
            </div>
            <div class="pdf-footer-right print-page-number"> 
                $footer_right$
            </div>            
        </div>
    </div>
</template>

<script>
(function () {
    const source = document.getElementById("pdf-source");
    const headerTemplate = document.getElementById("pdf-header-template");
    const footerTemplate = document.getElementById("pdf-footer-template");

    if (!source || !headerTemplate || !footerTemplate) {
        return;
    }

    const sourceNodes = Array.from(source.children);

    const pagesRoot = document.createElement("div");
    pagesRoot.id = "pdf-pages";
    document.body.appendChild(pagesRoot);
    source.style.display = "none";

    function createPage() {
        const page = document.createElement("section");
        page.className = "print-page";

        const pageNumber = pagesRoot.children.length + 1;

        const inner = document.createElement("div");
        inner.className = "print-page-inner";

        const header = document.createElement("div");
        header.className = "print-page-header";
        header.appendChild(headerTemplate.content.firstElementChild.cloneNode(true));

        if (pageNumber === 1) {
            header.classList.add("print-page-header--cover");
        }

        const content = document.createElement("div");
        content.className = "print-page-content";

        const cadernoContent = document.createElement("div");
        cadernoContent.className = "caderno-content";
        content.appendChild(cadernoContent);

        const footer = document.createElement("div");
        footer.className = "print-page-footer";
        footer.appendChild(footerTemplate.content.firstElementChild.cloneNode(true));

        inner.appendChild(header);
        inner.appendChild(content);
        inner.appendChild(footer);

        page.appendChild(inner);
        pagesRoot.appendChild(page);

        return cadernoContent;
    }

    function overflows(element) {
        return element.scrollHeight > element.clientHeight + 1;
    }

    function getContentBox(content) {
        return content.closest(".print-page-content");
    }

    function cloneTableShell(table) {
        const clone = table.cloneNode(false);
        const thead = table.querySelector("thead");

        if (thead) {
            clone.appendChild(thead.cloneNode(true));
        }

        const tbody = document.createElement("tbody");
        clone.appendChild(tbody);

        return { table: clone, tbody: tbody };
    }

    function placeBlock(node, content) {
        const pageBox = getContentBox(content);
        const clone = node.cloneNode(true);

        content.appendChild(clone);

        if (!overflows(pageBox)) {
            return content;
        }

        content.removeChild(clone);

        content = createPage();
        content.appendChild(clone);

        return content;
    }

    function placeTable(table, content) {
        const pageBox = getContentBox(content);
        const rows = Array.from(table.querySelectorAll("tbody > tr"));

        if (rows.length === 0) {
            return placeBlock(table, content);
        }

        let shell = cloneTableShell(table);
        content.appendChild(shell.table);

        for (const row of rows) {
            shell.tbody.appendChild(row.cloneNode(true));

            if (!overflows(pageBox)) {
                continue;
            }

            if (shell.tbody.children.length === 1) {
                continue;
            }

            shell.tbody.removeChild(shell.tbody.lastElementChild);

            content = createPage();
            shell = cloneTableShell(table);
            content.appendChild(shell.table);
            shell.tbody.appendChild(row.cloneNode(true));
        }

        return content;
    }

    function isManualPageBreak(node) {
        return node.classList && node.classList.contains("newpage");
    }

    let content = createPage();

    for (const node of sourceNodes) {
        if (isManualPageBreak(node)) {
            content = createPage();
            continue;
        }

        if (node.tagName === "TABLE") {
            content = placeTable(node, content);
            continue;
        }

        content = placeBlock(node, content);
    }

    const totalPages = pagesRoot.children.length;

    pagesRoot.querySelectorAll(".print-page-number").forEach(function (label, index) {
        label.textContent = "Página " + (index + 1) + " de " + totalPages;
    });
}());
</script>

</body>
</html>
